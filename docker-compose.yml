version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: soltrace
      POSTGRES_USER: soltrace
      POSTGRES_PASSWORD: ${DB_PASSWORD:-soltracepass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=4MB
      -c max_connections=50
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soltrace -d soltrace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - soltrace-net

  was:
    build:
      context: ./was
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://soltrace:${DB_PASSWORD:-soltracepass}@db:5432/soltrace
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-32chars-min}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - soltrace-net
    volumes:
      - ./was/static:/app/static:ro
    deploy:
      resources:
        limits:
          memory: 800M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - was
    networks:
      - soltrace-net
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:

networks:
  soltrace-net:
    driver: bridge
