worker_processes auto;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 100;
    server_tokens off;

    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1000;
    gzip_types text/plain application/json text/css application/javascript text/html;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:5m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=300r/m;
    limit_req_zone $binary_remote_addr zone=auth:1m rate=10r/m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    upstream was_backend {
        server was:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;
        client_body_buffer_size 128k;

        # Daemon ingest - higher limit
        location /api/v1/ingest/ {
            limit_req zone=ingest burst=100 nodelay;
            proxy_pass http://was_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Auth endpoints - strict limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://was_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin API
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://was_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # SPA + static
        location / {
            proxy_pass http://was_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_valid 200 5m;
        }
    }
}
