worker_processes auto;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 100;
    server_tokens off;

    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1000;
    gzip_types text/plain application/json text/css application/javascript text/html;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:5m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=300r/m;
    limit_req_zone $binary_remote_addr zone=auth:1m rate=10r/m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    upstream was_backend {
        server was:8000;
        keepalive 16;
    }

    # HTTP: Let's Encrypt 갱신 챌린지만 처리하고 나머지는 HTTPS로 리다이렉트
    server {
        listen 80;
        server_name soltrace.mbone.net;

        # certbot webroot 갱신용 (nginx 정지 없이 자동 갱신)
        location /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name soltrace.mbone.net;

        ssl_certificate     /etc/letsencrypt/live/soltrace.mbone.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/soltrace.mbone.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=31536000" always;

        client_max_body_size 10m;
        client_body_buffer_size 128k;

        # Daemon ingest - higher limit
        # FTP 서버 대역만 허용 (설치 후 실제 IP/대역으로 수정)
        # allow 192.168.0.0/24;
        # deny all;
        location /api/v1/ingest/ {
            limit_req zone=ingest burst=100 nodelay;
            proxy_pass http://was_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Auth endpoints - strict limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://was_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://was_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # SPA + static
        location / {
            proxy_pass http://was_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 5m;
        }
    }
}
